name: Deploy flower shop

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flowershop-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/flowershop_deploy
          chmod 600 ~/.ssh/flowershop_deploy
          ssh-keyscan -p "${SERVER_PORT:-22}" -H "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set +e
          ssh -i ~/.ssh/flowershop_deploy \
            -p "${SERVER_PORT:-22}" \
            "$SERVER_USER@$SERVER_HOST" \
            'sudo /usr/local/sbin/deploy-flowershop'
          deploy_status=$?
          set -e

          echo "Waiting for the restarted API to finish initialization..."
          sleep 15
          if ssh -i ~/.ssh/flowershop_deploy \
            -p "${SERVER_PORT:-22}" \
            "$SERVER_USER@$SERVER_HOST" \
            'curl --fail --silent --show-error http://127.0.0.1:5002/api/Categories >/dev/null'; then
            echo "Deployment verified: API is healthy."
            exit 0
          fi

          echo "Deployment command exit status: $deploy_status"
          echo "API health verification failed."
          exit 1
