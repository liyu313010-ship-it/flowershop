<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景矩形 -->
  <rect width="200" height="200" fill="#f5f5f5" rx="8" ry="8"/>
  
  <!-- 虚线框 -->
  <rect x="25" y="25" width="150" height="150" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" rx="4" ry="4"/>
  
  <!-- 花图标 -->
  <g fill="#999">
    <!-- 花茎 -->
    <line x1="100" y1="160" x2="100" y2="90" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/>
    
    <!-- 叶子 -->
    <path d="M100 120 C120 110, 130 90, 120 80" fill="none" stroke="#4CAF50" stroke-width="4"/>
    <path d="M100 120 C80 110, 70 90, 80 80" fill="none" stroke="#4CAF50" stroke-width="4"/>
    
    <!-- 花朵 -->
    <circle cx="100" cy="80" r="15" fill="#f44336"/>
    <circle cx="85" cy="85" r="12" fill="#f44336"/>
    <circle cx="115" cy="85" r="12" fill="#f44336"/>
    <circle cx="93" cy="70" r="12" fill="#f44336"/>
    <circle cx="107" cy="70" r="12" fill="#f44336"/>
    <circle cx="100" cy="98" r="12" fill="#f44336"/>
    
    <!-- 花蕊 -->
    <circle cx="100" cy="80" r="6" fill="#FFEB3B"/>
  </g>
  
  <!-- 文字 -->
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">产品图片</text>
</svg>